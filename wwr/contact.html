<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contact White Water Rafting Adventures to book your rafting trip, ask questions, or learn more about our guided river adventures."
    />
    <meta name="author" content="Geogrey Muiruri" />
    <title>Contact Us | White Water Rafting Adventures</title>
    <link rel="stylesheet" href="styles/rafting.css" />
  </head>

  <body>
    <header>
      <img src="images/raftlogo.png" alt="White Water Rafting Logo" />
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="trips.html">Trips</a></li>
          <li><a href="contact.html" class="active">Contact Us</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="contact-info">
        <h1>White Water Rafting Adventures</h1>
        <p>123 Main River Street</p>
        <p>Nairobi, Kenya</p>
        <p>+254 706567789</p>
        <p>info@whitewaterrafting.com</p>
      </section>

      <section class="contact-layout">
        <div class="map">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d255282.32335424496!2d36.84739685000001!3d-1.3032089500000008!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x182f1172d84d49a7%3A0xf7cf0254b297924c!2sNairobi!5e0!3m2!1sen!2ske!4v1780926332286!5m2!1sen!2ske"
            title="White Water Rafting Adventures Location"
            loading="lazy"
            allowfullscreen
            referrerpolicy="no-referrer-when-downgrade"
          >
          </iframe>
        </div>

        <form class="contact-form">
          <fieldset>
            <legend>Send Us a Message</legend>
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter Your Name"
            />

            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter Your Email"
            />

            <p>Message Purpose</p>
            <label for="purpose-general">
              <input
                type="radio"
                name="purpose"
                value="general"
                required
                id="purpose-general"
              />
              General Inquiry
            </label>

            <label for="purpose-reservation">
              <input
                type="radio"
                name="purpose"
                value="reservation"
                id="purpose-reservation"
              />
              Reservation Question
            </label>

            <label for="purpose-suggestion">
              <input
                type="radio"
                name="purpose"
                value="suggestion"
                id="purpose-suggestion"
              />
              Website Suggestion
            </label>

            <label for="message">Message</label>
            <textarea
              name="message"
              id="message"
              placeholder="type your message"
            ></textarea>

<label for="newsletter">
    <input type="checkbox" name="newsletter" id="newsletter">
    Please subscribe me to the monthly newsletter
</label>
            <button type="submit">Get in Touch!</button>
          </fieldset>
        </form>
      </section>

      <section class="employees">
        <h2>We Are Here to Serve You</h2>

        <div class="employee-grid">
          <figure>
            <img
              src="images/riverguide.webp"
              alt="Rafting guide employee profile"
            />
            <figcaption>River Guide</figcaption>
          </figure>

          <figure>
            <img
              src="images/reservation.webp"
              alt="Reservation specialist employee profile"
            />
            <figcaption>Reservation Specialist</figcaption>
          </figure>

          <figure>
            <img
              src="images/control.webp"
              alt="Customer support employee profile"
            />
            <figcaption>Customer Support</figcaption>
          </figure>
        </div>
      </section>
    </main>

    <!-- ── Footer ─────────────────────────────────────────── -->
    <footer>
      <p><small>&copy;2026 ❤️ Geogrey Mbugua Muiruri 🔥 Kenya</small></p>
      <nav class="socialmedia">
        <a href="https://facebook.com">
          <img src="images/facebook.png" alt="Facebook" />
        </a>
        <a href="https://instagram.com">
          <img src="images/instagram.png" alt="Instagram" />
        </a>
        <a href="https://twitter.com">
          <img src="images/twitter.png" alt="Twitter" />
        </a>
      </nav>
    </footer>
  </body>
</html>
